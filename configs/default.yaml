# StemForge default run configuration.
# Every field maps 1:1 to stemforge.orchestrator.RunConfig.
# Override any subtree from the CLI (`--set separation.model=htdemucs_6s`) or the Gradio UI.

device: auto            # auto | cuda | cpu
sample_rate: 44100      # Demucs/DrumSep native rate; ingest resamples to this
channels: 2
seed: 0

ingest:
  normalize: replaygain # replaygain | peak | none
  target_lufs: -18.0    # used when normalize == replaygain/peak fallback

analysis:
  enabled: true
  engine: beat_this     # beat_this | librosa  (librosa is the dependency-free fallback)
  bpm_from_regression: true   # robust source-BPM via linear regression over beat times

separation:
  enabled: true
  backend: demucs       # demucs | uvr (audio-separator/BS-Roformer) | hybrid (uvr vocals + demucs residual)
  preset: null          # fast | best | sota | max — layers over yaml, under explicit --set overrides
                        #   fast = demucs htdemucs · best = demucs htdemucs_ft shifts=2
                        #   sota = uvr BS-Roformer (vocals+instrumental) · max = hybrid 4-stem
  model: htdemucs_ft    # htdemucs_ft (4-stem, best) | htdemucs_6s (adds guitar/piano) | htdemucs
  uvr_model: model_bs_roformer_ep_317_sdr_12.9755.ckpt  # audio-separator checkpoint (auto-downloads)
  uvr_model_dir: models/uvr   # where audio-separator caches downloaded models
  uvr_venv: .venv-uvr         # ISOLATED audio-separator venv (create via `stemforge setup-sota`);
                              # never installed into the main env — it would clobber CUDA torch/numpy
  uvr_use_autocast: true      # mixed-precision inference on CUDA (passed to the CLI)
  # Multi-model ensemble via audio-separator's native ensembler (in the venv subprocess).
  # The `max` preset enables the verified vocal ensemble; set your own list to customize.
  ensemble_enabled: false
  ensemble_models: []         # e.g. [bs_roformer_vocals_resurrection_unwa.ckpt, melband_roformer_big_beta6x.ckpt]
  uvr_ensemble_algorithm: uvr_max_spec  # avg_wave | median_wave | max_fft | uvr_max_spec | …
  stems: [vocals, drums, bass, other]   # 6s adds: guitar, piano; uvr 2-stem: vocals, instrumental
  segment: 10           # seconds; lower => less VRAM
  overlap: 0.25
  shifts: 1             # >1 = test-time augmentation (slower, slightly better)
  export_formats: [wav] # wav | flac | mp3
  no_cuda_memory_caching: false  # set true on <=3 GB VRAM cards

stretch:
  enabled: false
  target_bpm: null      # e.g. 120 ; null disables
  engine: rubberband    # rubberband | signalsmith
  crisp: 5              # Rubber Band transient/crispness 0-6
  preserve_formant: true # keep formants on vocal stems
  per_stem_target_bpm: {}   # e.g. {drums: 90} to override a single stem

midi:
  enabled: false
  engine: onnx          # onnx (preferred, no TF) | basic_pitch (pulls TensorFlow)
  onnx_model_path: models/basic_pitch.onnx
  stems: [bass, other, guitar, piano]  # which melodic stems to transcribe
  monophonic_stems: [bass]  # constrain to 1 note at a time -> far higher accuracy
  onset_threshold: 0.5
  frame_threshold: 0.3
  min_note_length_ms: 58
  min_frequency: 32.7   # C1
  max_frequency: 3000.0
  melodia_trick: true
  include_pitch_bends: true
  quantize_to_grid: false

drums:
  split:
    enabled: false
    backend: demucs_inagoy    # demucs_inagoy (default) | uvr_drumsep (MDX23C via .venv-uvr) | uvr | larsnet | external
    model: drumsep_roformer   # legacy label for the larsnet/external paths
    parts: [kick, snare, toms, other]   # inagoy/drumsep emits these 4
    from_input: false         # true = tear down the raw input loop (skip needing a drums stem)
    # inagoy/drumsep: a Demucs checkpoint, auto-downloaded to models/drumsep/ on first use.
    # Public, non-gated MIT mirror (the old mnstrmnl/drumsep URL now returns 401).
    inagoy_url: https://huggingface.co/Eddycrack864/Drumsep/resolve/main/modelo_final.th
    inagoy_model_dir: models/drumsep
    # sha256 integrity pin (audit C1): the downloaded/cached checkpoint MUST match
    # this or it is refused (no unsafe torch.load without a verified hash). Override
    # inagoy_url only together with a matching inagoy_sha256 (else load is refused).
    inagoy_sha256: aefaa8543c9b9c75e22f5f32b53ab86dfe416457849af1383ff1aef83401423f
    # uvr_drumsep: MDX23C per-hit DrumSep via the isolated .venv-uvr (an option, not the
    # default — its .ckpt is registry-listed but couldn't be download-verified in-env).
    uvr_drumsep_model: MDX23C-DrumSep-aufr33-jarredou.ckpt
    # `uvr` drum path (isolated venv) — auto-discovers a kit-isolation model, not per-hit
    uvr_model: null
    uvr_model_dir: models/uvr
    uvr_venv: .venv-uvr
    uvr_use_autocast: true
    larsnet_wiener: 1.0       # alpha-Wiener filter for LarsNet crosstalk reduction
    external_cmd: null        # optional shell template for repo-based inference
  midi:
    enabled: false
    adt_model: adtof          # adtof (CRNN, 5-class) | omnizart | adtlib
    expand_to_7class: true    # crash/ride + open/closed hi-hat via stem-loudness heuristics
    velocity_from_stems: true # RMS envelope -> MIDI velocity
    velocity_window_ms: 50
    velocity_hop_ms: 10
    external_cmd: null
    # --- Calibration (PR-A4) ---
    velocity_percentile: 98   # per-part reference level (robust to a stray peak)
    dedupe_window_ms: 18      # cross-part coincidence window
    dedupe_weak_ratio: 0.5    # drop a coincident cross-part hit weaker than this x the loudest (bleed)
    hat_open_short_ms: 25     # hi-hat open/closed decay test
    hat_open_long_ms: 130
    hat_open_ratio: 0.35
    tom_split: true           # split toms low/mid/high by dominant pitch
    tom_low_hz: 100
    tom_mid_hz: 220
    cymbal_hf_cut_hz: 6000    # cymbal onset classifier (config-ified from PR-A1)
    cymbal_min_hf_ratio: 0.30
    cymbal_min_peak: 0.001
    cymbal_attack_ms: 30
    cymbal_sustain_ms: 180
    cymbal_closed_decay_max: 0.30
    cymbal_crash_decay_min: 0.55
    cymbal_bright_centroid_hz: 7000
    cymbal_ambiguous: generic # generic | drop
    cymbal_generic_note: 42

output:
  root: out             # per-song bundle: out/<song>/{stems,midi,drums,stretched}
  write_manifest: true
